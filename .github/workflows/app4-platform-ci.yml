name: App4 - Plataforma e Integración CI

on:
  push:
    branches: [master, main]
    paths:
      - 'app4-platform/**'
      - 'docker-compose.yml'
      - '.github/workflows/app4-platform-ci.yml'
  pull_request:
    paths:
      - 'app4-platform/**'
      - 'docker-compose.yml'
      - '.github/workflows/app4-platform-ci.yml'

jobs:
  notifications:
    name: Notificaciones (Java / Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build y test (Maven)
        working-directory: app4-platform/notifications
        run: mvn -B verify

      - name: Build imagen Docker
        run: docker build -t app4-notifications:ci ./app4-platform

  gateway:
    name: API Gateway (NGINX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t app4-gateway:ci -f ./app4-platform/gateway.Dockerfile ./app4-platform

      - name: Validar sintaxis de nginx.conf
        run: docker run --rm app4-gateway:ci nginx -t

  compose-validate:
    name: Validar docker-compose unificado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config
        run: docker compose config
