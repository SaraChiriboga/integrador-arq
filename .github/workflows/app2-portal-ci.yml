name: App2 - Portal Ciudadano CI

on:
  push:
    branches: [master, main]
    paths:
      - 'app2-portal/**'
      - '.github/workflows/app2-portal-ci.yml'
  pull_request:
    paths:
      - 'app2-portal/**'
      - '.github/workflows/app2-portal-ci.yml'

jobs:
  backend:
    name: Backend (Java / Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build y test (Maven)
        working-directory: app2-portal/backend
        run: mvn -B verify

      - name: Build imagen Docker
        run: docker build -t app2-backend:ci ./app2-portal

  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app2-portal/frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: app2-portal/frontend
        run: npm ci --omit=optional

      - name: Lint
        working-directory: app2-portal/frontend
        run: npm run lint

      - name: Test
        working-directory: app2-portal/frontend
        run: npm run test

      - name: Build
        working-directory: app2-portal/frontend
        run: npm run build

      - name: Build imagen Docker
        run: docker build -t app2-frontend:ci ./app2-portal/frontend
