name: App3 - Compliance Engine CI

on:
  push:
    branches: [master, main]
    paths:
      - 'app3-compliance/**'
      - '.github/workflows/app3-compliance-ci.yml'
  pull_request:
    paths:
      - 'app3-compliance/**'
      - '.github/workflows/app3-compliance-ci.yml'

jobs:
  backend:
    name: Backend (Java / Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build y test (Maven)
        working-directory: app3-compliance/backend
        run: mvn -B verify

      - name: Build imagen Docker
        run: docker build -t app3-backend:ci ./app3-compliance

  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app3-compliance/frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: app3-compliance/frontend
        run: npm ci

      - name: Lint
        working-directory: app3-compliance/frontend
        run: npm run lint

      - name: Build
        working-directory: app3-compliance/frontend
        run: npm run build

      - name: Build imagen Docker
        run: docker build -t app3-frontend:ci ./app3-compliance/frontend
