worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    log_format gw_json escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
                                    '"request":"$request","status":$status,'
                                    '"request_time":$request_time,"upstream":"$upstream_addr"}';
    access_log /dev/stdout gw_json;
    error_log  /dev/stderr warn;

    # ------------------------------------------------------------------
    # Rate Limiting (mitigacion DDoS perimetral) - 20 req/min por IP
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
    limit_req_status 429;

    # ------------------------------------------------------------------
    # CORS - solo se permiten los origenes conocidos de los frontends
    # ------------------------------------------------------------------
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" $http_origin;
        "http://localhost:5174" $http_origin;
    }

    # ------------------------------------------------------------------
    # "WAF ligero": bloqueo de patrones comunes de SQLi/XSS en la query
    # string y en el cuerpo. No sustituye un WAF de produccion (p.ej.
    # ModSecurity + OWASP CRS); es una mitigacion basica razonable para
    # el alcance academico de este proyecto (ver docs/quality-attributes).
    # ------------------------------------------------------------------
    map $request_uri $blocked_pattern {
        default 0;
        "~*(\.\./|<script|union\s+select|drop\s+table|--\s|;\s*--|'\s*or\s*'1'\s*=\s*'1)" 1;
    }

    upstream app2_backend {
        server app2-backend:8080;
    }

    upstream app3_backend {
        server app3-backend:8081;
    }

    upstream app4_notifications {
        server app4-notifications:8082;
    }

    # ------------------------------------------------------------------
    # HTTP -> HTTPS
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------------
    # HTTPS - Gateway principal
    # ------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway.crt;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 5m;

        # Cabeceras de hardening
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        if ($blocked_pattern = 1) {
            return 403;
        }

        # ---- App 2: Portal Ciudadano ----
        location /api/v1/reports/ {
            limit_req zone=api_limit burst=5 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://app2_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- App 3: Compliance Engine ----
        location /api/v1/compliance/ {
            limit_req zone=api_limit burst=5 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://app3_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Servicio de Notificaciones: WebSockets (STOMP/SockJS) ----
        location /ws/ {
            proxy_pass http://app4_notifications/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ---- SwaggerHub centralizada: specs OpenAPI crudas de cada API ----
        location /docs/portal/v3/api-docs {
            proxy_pass http://app2_backend/v3/api-docs;
            proxy_set_header Host $host;
        }

        location /docs/compliance/v3/api-docs {
            proxy_pass http://app3_backend/v3/api-docs;
            proxy_set_header Host $host;
        }

        location / {
            return 404;
        }
    }
}
