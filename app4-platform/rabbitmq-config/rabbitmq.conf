# Configuracion del broker RabbitMQ - Paquete D
# Carga la topologia declarativa (exchanges, DLX/DLQ y policies) al arrancar,
# de forma idempotente y compatible con lo que declaran App1/App2/App3 por codigo.
management.load_definitions = /etc/rabbitmq/definitions.json

# Limites razonables para entorno de desarrollo
channel_max = 128
heartbeat = 60
